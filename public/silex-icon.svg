<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="SILEX icon">
  <defs>
    <!-- Main brand gradient: indigo → blue → teal -->
    <linearGradient id="grad-main" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8B5CF6"/>
      <stop offset="45%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#00D2A0"/>
    </linearGradient>
    <linearGradient id="grad-cross" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!--
    SILEX hexagonal wireframe mark.

    The logo is a flat-top hexagon (like a stop sign rotated 30°) 
    that acts as the outer shell of a 3D box.
    Inside, three horizontal rails divide it into top/mid/bottom bands.
    An "S" shape is formed by:
      - Top band: full-width bar on the right side
      - Diagonal cross from top-right to bottom-left across the middle band
      - Bottom band: full-width bar on the left side
    Plus vertical strokes and depth cues give the wireframe / isometric look.

    Hex center: 100,100  outer radius: 88
    Flat-top hex vertices (angle offset 30°):
      Top-right:    100+88*cos(30)=176.2, 100-88*sin(30)=56  → 176,56
      Right:        100+88, 100           → 188,100
      Bottom-right: 176, 144
      Bottom-left:  24, 144
      Left:         12, 100
      Top-left:     24, 56
  -->

  <!-- ── Outer hexagon ── -->
  <path
    d="M100 12 L176 56 L176 144 L100 188 L24 144 L24 56 Z"
    stroke="url(#grad-main)"
    stroke-width="5"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- ── Three horizontal band dividers ── -->
  <!-- Upper rail (top of S middle band) -->
  <line x1="24"  y1="78"  x2="176" y2="78"  stroke="url(#grad-main)" stroke-width="4" stroke-linecap="round"/>
  <!-- Lower rail (bottom of S middle band) -->
  <line x1="24"  y1="122" x2="176" y2="122" stroke="url(#grad-main)" stroke-width="4" stroke-linecap="round"/>

  <!-- ── S structure: top bar block (right side of top band) ── -->
  <!-- Top-right vertical post -->
  <line x1="150" y1="12"  x2="150" y2="78"  stroke="url(#grad-main)" stroke-width="4" stroke-linecap="round"/>
  <!-- Top-right horizontal join to hex edge approximation -->
  <line x1="150" y1="12"  x2="176" y2="28"  stroke="url(#grad-main)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- ── S structure: bottom bar block (left side of bottom band) ── -->
  <!-- Bottom-left vertical post -->
  <line x1="50"  y1="122" x2="50"  y2="188" stroke="url(#grad-main)" stroke-width="4" stroke-linecap="round"/>
  <!-- Bottom-left horizontal join -->
  <line x1="24"  y1="172" x2="50"  y2="188" stroke="url(#grad-main)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- ── S diagonal cross (middle band) ── -->
  <!-- Main cross: from top-left of band to bottom-right of band -->
  <line x1="24"  y1="78"  x2="176" y2="122" stroke="url(#grad-cross)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- ── Additional vertical bars creating the wireframe S interior ── -->
  <!-- Left bar spanning top band -->
  <line x1="50"  y1="56"  x2="50"  y2="78"  stroke="url(#grad-main)" stroke-width="4" stroke-linecap="round"/>
  <!-- Left bar top cap -->
  <line x1="24"  y1="56"  x2="50"  y2="56"  stroke="url(#grad-main)" stroke-width="4" stroke-linecap="round"/>

  <!-- Right bar spanning bottom band -->
  <line x1="150" y1="122" x2="150" y2="144" stroke="url(#grad-main)" stroke-width="4" stroke-linecap="round"/>
  <!-- Right bar bottom cap -->
  <line x1="150" y1="144" x2="176" y2="144" stroke="url(#grad-main)" stroke-width="4" stroke-linecap="round"/>

  <!-- ── Inner depth / lattice lines for 3D wireframe feel ── -->
  <!-- Top center vertical (depth) -->
  <line x1="100" y1="12"  x2="100" y2="56"  stroke="url(#grad-main)" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Bottom center vertical (depth) -->
  <line x1="100" y1="144" x2="100" y2="188" stroke="url(#grad-main)" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>

  <!-- Inner mid-top horizontal (top face of the box) -->
  <line x1="50"  y1="34"  x2="150" y2="34"  stroke="url(#grad-main)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Inner mid-bottom horizontal (bottom face) -->
  <line x1="50"  y1="166" x2="150" y2="166" stroke="url(#grad-main)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Diagonal depth left (top face, left edge) -->
  <line x1="24"  y1="56"  x2="50"  y2="34"  stroke="url(#grad-main)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Diagonal depth right (top face, right edge) -->
  <line x1="176" y1="56"  x2="150" y2="34"  stroke="url(#grad-main)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Diagonal depth left (bottom face) -->
  <line x1="24"  y1="144" x2="50"  y2="166" stroke="url(#grad-main)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Diagonal depth right (bottom face) -->
  <line x1="176" y1="144" x2="150" y2="166" stroke="url(#grad-main)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
</svg>
